<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <title>Bon Appétite!</title>
  <meta name="description" content="This site will serve as the hub for many sub responsive layouts">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">

  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="icon.png">
  <!-- Place favicon.ico in the root directory -->

  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">

  <meta name="theme-color" content="#fafafa">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bonbon&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>

  <header class="h1">
    <h1>Bon Appétite! Pick a Pastry to Eat!</h1>
  </header>

  <background-img src="./img/bbcrumbs.png" class="base"></background-img>
  <div class="scene">
      <div class="pastry clickable croissant c1" data-default="croissant-1.png" data-bite="img/croissant1-bite.png">
      <img src="./img/croissant1.png">
      <span class="tag">Try Me!</span>
      </div>

    <div class="pastry clickable croissant c2" data-default="croissant-2.png" data-bite="img/croissant2-bite.png">
      <img src="./img/croissant2.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable macaroon m1" data-default="macaroon-1.png" data-bite="img/macaroon1-bite.png">
      <img src="./img/macaroon1.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable macaroon m2" data-default="macaroon-2.png" data-bite="img/macaroon2-bite.png">
      <img src="./img/macaroon2.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable madeline md1" data-default="madeline-1.png" data-bite="img/madeline1-bite.png">
      <img src="./img/madeline1.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable madeline md2" data-default="madeline-2.png" data-bite="img/madeline2-bite.png">
      <img src="./img/madeline2.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable tart" data-default="tart.png" data-bite="img/tart-bite.png">
      <img src="./img/tart.png">
      <span class="tag">Try Me!</span>
    </div>

  </div>

  <button id="musicToggle" class="music-btn">
  <span id="musicIcon">♪</span>
</button>

<audio id="bgMusic" loop>
  <source src="music/background.mp3" type="audio/mp3">
</audio>
  
<script src="js/main.js"></script>
</body>
</html>
