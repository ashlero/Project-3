<!doctype html>
<html class="no-js" lang="en">

<head>
  <meta charset="utf-8">
  <title>Bon Appétite!</title>
  <meta name="description" content="Pick a pastry, take a bite, and enjoy a little moment of sweetness.">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">

  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" href="./img/icon.png">

  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/main.css">

  <meta name="theme-color" content="#fafafa">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bonbon&family=Pacifico&display=swap" rel="stylesheet">

</head>

<body>
  <p class="enjoy">yum! the pastries are ready to eat</p>
  <div class="top-bar">
    <h1 class="bounce-title">Bon Appétite!</h1>

    <button id="musicToggle" class="music-btn" aria-label="Toggle music">
      <span class="music-icon">♪</span>
    </button>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="./img/music.mp4" type="audio/mp4">
  </audio>

  <div class="scene">
      <div class="pastry clickable croissant c1" data-default="img/croissant1.png" data-bite="img/croissant1-bite.png">
      <img src="./img/croissant1.png">
      <span class="tag">Try Me!</span>
      </div>

    <div class="pastry clickable croissant c2" data-default="img/croissant2.png" data-bite="img/croissant2-bite.png">
      <img src="./img/croissant2.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable macaroon m1" data-default="img/macaroon1.png" data-bite="img/macaroon1-bite.png">
      <img src="./img/macaroon1.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable macaroon m2" data-default="img/macaroon2.png" data-bite="img/macaroon2-bite.png">
      <img src="./img/macaroon2.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable madeline md1" data-default="img/madeline1.png" data-bite="img/madeline1-bite.png">
      <img src="./img/madeline1.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable madeline md2" data-default="img/madeline2.png" data-bite="img/madeline2-bite.png">
      <img src="./img/madeline2.png">
      <span class="tag">Try Me!</span>
    </div>

    <div class="pastry clickable tart" data-default="img/tart.png" data-bite="img/tart-bite.png">
      <img src="./img/tart.png">
      <span class="tag">Try Me!</span>
    </div>

    <button id="resetBtn" class="reset-btn">I'm full</button>

  </div>
  
<script src="js/main.js"></script>
</body>
</html>
